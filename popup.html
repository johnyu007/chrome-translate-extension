<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 翻译助手</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body class="popup-mode">
  <div class="app">
    <!-- 顶部语言栏 -->
    <header class="header">
      <div class="lang-bar">
        <div class="lang-item lang-source">
          <select id="sourceLang" class="lang-select">
            <option value="">检测语言</option>
            <option value="en">英语</option>
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁体中文</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="pt">葡萄牙语</option>
            <option value="ru">俄语</option>
            <option value="ar">阿拉伯语</option>
            <option value="hi">印地语</option>
            <option value="th">泰语</option>
            <option value="vi">越南语</option>
            <option value="it">意大利语</option>
            <option value="nl">荷兰语</option>
            <option value="pl">波兰语</option>
            <option value="tr">土耳其语</option>
            <option value="id">印尼语</option>
            <option value="ms">马来语</option>
          </select>
        </div>
        <button id="swapLangBtn" class="swap-btn" title="交换语言">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 16L3 12L7 8" />
            <path d="M17 8L21 12L17 16" />
            <path d="M3 12H21" />
          </svg>
        </button>
        <div class="lang-item lang-target">
          <select id="targetLang" class="lang-select">
            <option value="zh-CN" selected>简体中文</option>
            <option value="zh-TW">繁体中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="pt">葡萄牙语</option>
            <option value="ru">俄语</option>
            <option value="ar">阿拉伯语</option>
            <option value="hi">印地语</option>
            <option value="th">泰语</option>
            <option value="vi">越南语</option>
            <option value="it">意大利语</option>
            <option value="nl">荷兰语</option>
            <option value="pl">波兰语</option>
            <option value="tr">土耳其语</option>
            <option value="id">印尼语</option>
            <option value="ms">马来语</option>
          </select>
        </div>
      </div>
    </header>

    <!-- 原文输入区 -->
    <section class="source-section">
      <div class="section-header">
        <span class="section-label">原文</span>
        <div class="source-actions">
          <span id="charCount" class="char-count">0 / 5000</span>
          <button id="clearBtn" class="icon-btn" title="清除">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
      <textarea
        id="sourceText"
        class="source-textarea"
        placeholder="输入文本，或复制网页内容自动捕捉..."
        maxlength="50000"
      ></textarea>
      <div class="translate-row">
        <button id="translateBtn" class="translate-btn">
          <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 8l4 4-4 4" />
            <path d="M12 20h8" />
          </svg>
          翻译
        </button>
      </div>
    </section>

    <!-- 翻译结果区 -->
    <section id="resultSection" class="result-section" style="display: none;">
      <div class="section-header">
        <span class="section-label">译文</span>
        <div class="result-actions">
          <button id="copyResultBtn" class="icon-btn" title="复制译文">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
          </button>
          <button id="retranslateBtn" class="icon-btn" title="重新翻译">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6" />
              <path d="M1 20v-6h6" />
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
          </button>
        </div>
      </div>
      <div id="resultContent" class="result-content"></div>
      <div id="resultStatus" class="result-status"></div>
    </section>

    <!-- 翻译中状态 -->
    <section id="loadingSection" class="loading-section" style="display: none;">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <span class="loading-text">翻译中...</span>
    </section>

    <!-- 错误提示 -->
    <div id="errorBanner" class="error-banner" style="display: none;">
      <span id="errorMessage"></span>
      <button id="dismissError" class="icon-btn">×</button>
    </div>

    <!-- 底部 -->
    <footer class="footer">
      <button id="settingsBtn" class="footer-btn" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      </button>
    </footer>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
