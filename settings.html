<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 — AI 翻译助手</title>
  <link rel="stylesheet" href="sidepanel.css">
  <style>
    .settings-container {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .settings-header {
      margin-bottom: 24px;
    }

    .settings-header h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--color-text);
    }

    .settings-header p {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    .settings-card {
      background: var(--color-bg);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    .settings-card h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--color-border);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--color-text);
      font-family: inherit;
      transition: border-color var(--transition);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px var(--color-primary-light);
    }

    .form-input::placeholder {
      color: var(--color-text-tertiary);
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row .form-input {
      flex: 1;
    }

    .toggle-btn {
      padding: 8px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .toggle-btn:hover {
      background: var(--color-bg-secondary);
    }

    .toggle-btn.show {
      background: var(--color-primary-light);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .form-hint {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 4px;
    }

    .form-textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--color-text);
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
      transition: border-color var(--transition);
    }

    .form-textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px var(--color-primary-light);
    }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .toggle-label {
      font-size: 14px;
      color: var(--color-text);
    }

    .toggle-desc {
      font-size: 12px;
      color: var(--color-text-tertiary);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--color-border);
      border-radius: 24px;
      transition: var(--transition);
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: var(--transition);
    }

    input:checked + .slider {
      background: var(--color-primary);
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    .save-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-secondary {
      padding: 10px 20px;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-secondary:hover {
      background: var(--color-bg-secondary);
    }

    .btn-primary {
      padding: 10px 24px;
      border: none;
      border-radius: 20px;
      background: var(--color-primary);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 1px 3px rgba(26,115,232,0.3);
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
      box-shadow: 0 2px 6px rgba(26,115,232,0.4);
    }

    .save-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      background: var(--color-text);
      color: white;
      border-radius: 20px;
      font-size: 13px;
      animation: fadeInOut 2s ease forwards;
      pointer-events: none;
      z-index: 1000;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.connected { background: var(--color-success); }
    .status-dot.disconnected { background: var(--color-error); }
  </style>
</head>
<body>
  <div class="settings-container">
    <header class="settings-header">
      <h1>⚙️ 翻译设置</h1>
      <p>配置 AI 翻译引擎的连接参数</p>
    </header>

    <!-- API 配置 -->
    <div class="settings-card">
      <h2>🔑 API 配置</h2>
      <div class="form-group">
        <label class="form-label" for="apiEndpoint">API 端点 URL</label>
        <input
          type="url"
          id="apiEndpoint"
          class="form-input"
          placeholder="https://api.openai.com/v1/chat/completions"
        >
        <div class="form-hint">
          支持 OpenAI 兼容接口：OpenAI、DeepSeek、Ollama、Groq 等
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="apiKey">API Key</label>
        <div class="input-row">
          <input
            type="password"
            id="apiKey"
            class="form-input"
            placeholder="sk-..."
            autocomplete="off"
          >
          <button id="toggleKeyBtn" class="toggle-btn" type="button">显示</button>
        </div>
        <div class="form-hint">
          Key 仅存储在本机 chrome.storage.local，不上传云端
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="model">模型名称</label>
        <input
          type="text"
          id="model"
          class="form-input"
          placeholder="gpt-4o"
        >
        <div class="form-hint">
          例如: gpt-4o, gpt-4o-mini, deepseek-chat, claude-sonnet-4-6
        </div>
      </div>
    </div>

    <!-- 翻译偏好 -->
    <div class="settings-card">
      <h2>🌐 翻译偏好</h2>
      <div class="form-group">
        <label class="form-label" for="targetLanguage">默认目标语言</label>
        <select id="targetLanguage" class="form-input">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="pt">葡萄牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>
      <div class="toggle-group">
        <div>
          <div class="toggle-label">自动翻译</div>
          <div class="toggle-desc">复制文本后自动触发翻译</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="autoTranslate" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label" for="systemPrompt">
          自定义翻译指令
          <span style="text-transform: none; font-weight: 400;">（可选）</span>
        </label>
        <textarea
          id="systemPrompt"
          class="form-textarea"
          placeholder="留空使用默认翻译指令。自定义示例：&#10;你是一个技术文档翻译专家，请将以下内容翻译为{目标语言}，保持代码块和 markdown 格式不变。"
        ></textarea>
        <div class="form-hint">
          留空则使用默认的专业翻译 System Prompt
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="save-bar">
      <button id="resetBtn" class="btn-secondary">恢复默认</button>
      <button id="saveBtn" class="btn-primary">保存设置</button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
